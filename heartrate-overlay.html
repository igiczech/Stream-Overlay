<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>HR Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    height: 100vh;
    padding: 24px;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 220px;
  }

  .ecg-wrap {
    position: relative;
    width: 100%;
    height: 54px;
    margin-bottom: 6px;
  }

  canvas#ecg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 0 6px #ff2020cc);
  }

  .bpm-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .heart {
    font-size: 22px;
    color: #cc0000;
    animation: pulse 1s ease-in-out infinite;
    filter: drop-shadow(0 0 8px #ff0000);
    line-height: 1;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.25); opacity: 1; }
  }

  .bpm-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 38px;
    color: #ff2020;
    letter-spacing: 2px;
    text-shadow: 0 0 12px #ff0000, 0 0 30px #880000;
    line-height: 1;
  }

  .bpm-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #aa3333;
    letter-spacing: 3px;
    text-transform: uppercase;
    align-self: flex-end;
    padding-bottom: 4px;
    text-shadow: 0 0 6px #ff000088;
  }

  .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #660000;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.75;
  }

  body.panic .bpm-value {
    animation: flicker 0.15s infinite;
    color: #ff4444;
  }
  body.panic .heart {
    animation: pulse-fast 0.35s ease-in-out infinite;
    color: #ff0000;
  }
  body.panic canvas#ecg {
    filter: drop-shadow(0 0 14px #ff0000);
  }

  @keyframes pulse-fast {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #440000;
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
  }
  .status.connected {
    background: #aa0000;
    box-shadow: 0 0 6px #ff0000;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .disconnect-msg {
    font-size: 9px;
    color: #440000;
    letter-spacing: 2px;
    margin-top: 2px;
    display: none;
    font-family: 'Share Tech Mono', monospace;
  }
  .disconnect-msg.show { display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="ecg-wrap">
    <canvas id="ecg"></canvas>
  </div>
  <div class="bpm-row">
    <span class="heart">♥</span>
    <span class="bpm-value" id="bpmDisplay">---</span>
    <span class="bpm-unit">BPM</span>
    <span class="status" id="statusDot"></span>
  </div>
  <div class="label">HEART RATE <span id="panicLabel"></span></div>
  <div class="disconnect-msg" id="disconnectMsg">NO SIGNAL</div>
</div>

<script>
// ============================================================
//  NASTAVENÍ — sem vlož své HypeRate Session ID
// ============================================================
const HYPERATE_SESSION_ID = "56686";
const PANIC_THRESHOLD = 120;
// ============================================================

const bpmDisplay = document.getElementById('bpmDisplay');
const statusDot = document.getElementById('statusDot');
const disconnectMsg = document.getElementById('disconnectMsg');
const panicLabel = document.getElementById('panicLabel');

// ECG canvas
const canvas = document.getElementById('ecg');
const ctx = canvas.getContext('2d');
canvas.width = 220;
canvas.height = 54;

const ecgData = new Array(220).fill(27);
let currentBpm = 0;
let beatInterval = 800;
let lastBeat = 0;
let beatQueue = [];

const qrsTemplate = [
  0.5, 0.52, 0.54, 0.52, 0.5,
  0.5, 0.5, 0.5,
  0.3, 0.1, 0.9, 0.1, 0.5,
  0.5, 0.5, 0.5,
  0.55, 0.6, 0.58, 0.55, 0.5,
  0.5, 0.5, 0.5, 0.5, 0.5
];

function triggerBeat() {
  beatQueue.push({ template: [...qrsTemplate], idx: 0 });
}

function drawECG() {
  let nextVal = 0.5;
  if (beatQueue.length > 0) {
    const beat = beatQueue[0];
    if (beat.idx < beat.template.length) {
      nextVal = beat.template[beat.idx];
      beat.idx++;
    } else {
      beatQueue.shift();
    }
  }

  const y = (1 - nextVal) * (canvas.height - 6) + 3;
  ecgData.push(y);
  if (ecgData.length > canvas.width) ecgData.shift();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.strokeStyle = 'rgba(255, 20, 20, 0.25)';
  ctx.lineWidth = 4;
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ecgData.forEach((v, i) => i === 0 ? ctx.moveTo(i, v) : ctx.lineTo(i, v));
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = '#ff2020';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ecgData.forEach((v, i) => i === 0 ? ctx.moveTo(i, v) : ctx.lineTo(i, v));
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(drawECG);
}

function beatTick(ts) {
  if (currentBpm > 0 && ts - lastBeat >= beatInterval) {
    triggerBeat();
    lastBeat = ts;
    const heartEl = document.querySelector('.heart');
    heartEl.style.animationDuration = (beatInterval / 1000) + 's';
  }
  requestAnimationFrame(beatTick);
}

function updateBpm(bpm) {
  currentBpm = bpm;
  beatInterval = bpm > 0 ? (60000 / bpm) : 800;
  bpmDisplay.textContent = bpm > 0 ? String(bpm).padStart(3, '0') : '---';

  if (bpm >= PANIC_THRESHOLD) {
    document.body.classList.add('panic');
    panicLabel.textContent = '⚠ PANIC';
  } else {
    document.body.classList.remove('panic');
    panicLabel.textContent = '';
  }
}

async function fetchHR() {
  try {
    const r = await fetch('https://app.hyperate.io/api/heartrate/' + HYPERATE_SESSION_ID);
    if (r.ok) {
      const d = await r.json();
      if (d && d.hr) {
        updateBpm(d.hr);
        statusDot.classList.add('connected');
        disconnectMsg.classList.remove('show');
      }
    } else {
      throw new Error('bad response');
    }
  } catch (e) {
    statusDot.classList.remove('connected');
    disconnectMsg.classList.add('show');
  }
}

drawECG();
requestAnimationFrame(beatTick);
fetchHR();
setInterval(fetchHR, 2000);
</script>
</body>
</html>
